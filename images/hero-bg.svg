<svg width="100%" height="100%" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#764ba2" stop-opacity="0.8"/>
    </linearGradient>
    <pattern id="pattern" patternUnits="userSpaceOnUse" width="100" height="100">
      <circle cx="50" cy="50" r="2" fill="white" opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#gradient)"/>
  <rect width="100%" height="100%" fill="url(#pattern)"/>
  <!-- 装饰性元素 -->
  <circle cx="200" cy="150" r="80" fill="rgba(255,255,255,0.1)" opacity="0.3"/>
  <circle cx="1000" cy="450" r="120" fill="rgba(255,255,255,0.1)" opacity="0.2"/>
  <rect x="400" y="200" width="60" height="60" fill="rgba(255,255,255,0.1)" opacity="0.2" transform="rotate(45 430 230)"/>
</svg>